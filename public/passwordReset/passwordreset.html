<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeLink - Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="passwordreset.css"/>
</head>
<body>

  <!-- ── Header ── -->
  <div class="header">
    <img src="../images/lifelink_logo.svg" alt="LifeLink Logo"/>
    <span class="header-title">LifeLink</span>
  </div>

  <!-- ── Page ── -->
  <div class="page">

    <!-- Back link -->
    <a href="#" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to Login
    </a>

    <!-- Card -->
    <div class="card">

      <!-- Lock / refresh icon -->
      <div class="icon-badge">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="11" width="14" height="10" rx="2" stroke="#b92020" stroke-width="1.9" fill="none"/>
          <line x1="12" y1="15" x2="12" y2="17" stroke="#b92020" stroke-width="2" stroke-linecap="round"/>
          <path d="M8 11V7a4 4 0 0 1 6.5-3.1" stroke="#b92020" stroke-width="1.9" stroke-linecap="round" fill="none"/>
          <path d="M17.5 4.5 A6.5 6.5 0 0 1 18 8" stroke="#b92020" stroke-width="1.9" stroke-linecap="round" fill="none"/>
          <polyline points="15.5 3 17.5 4.5 16 6.5" stroke="#b92020" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>

      <h1 class="card-title">Reset your password</h1>
      <p class="card-desc">Enter your email address and we'll send you a reset link.</p>

      <!-- Email field -->
      <label class="field-label" for="email">Email Address</label>
      <div class="input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
        <input type="email" id="email" placeholder="name@example.com" autocomplete="email"/>
      </div>

      <button class="btn" id="sendBtn" onclick="handleSend()">Send Reset Link</button>

    </div><!-- /card -->

    <!-- Success notice -->
    <div class="success-wrap" id="successWrap">
      <div class="success-notice">
        <div class="check-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="notice-text">
          <strong>Check your inbox</strong>
          <p>If this email is registered, a reset link has been sent. Check your inbox.</p>
        </div>
      </div>
    </div>

    <!-- Support -->
    <p class="support-line">Having trouble? <a href="#">Contact Support</a></p>

  </div><!-- /page -->

  <script src="passwordreset.js"></script>

</body>
</html>
