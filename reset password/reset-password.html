<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeLink – Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="reset-style.css" />
</head>
<body>

  <!-- Top Nav -->
  <header class="topnav">
    <div class="topnav-logo">
      <img src="life_link_logo.jpg" alt="LifeLink Logo" class="nav-logo-img" />
      <span>LifeLink</span>
    </div>
    <nav class="topnav-links">
      <a href="#">Support</a>
      <a href="#">About</a>
    </nav>
  </header>

  <div class="page">

    <!-- Icon above card -->
    <div class="reset-icon-wrap">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 16C6 10.477 10.477 6 16 6c3.09 0 5.845 1.355 7.745 3.5" stroke="#B91C1C" stroke-width="2" stroke-linecap="round"/>
        <path d="M26 16c0 5.523-4.477 10-10 10a9.964 9.964 0 01-7.745-3.5" stroke="#B91C1C" stroke-width="2" stroke-linecap="round"/>
        <path d="M22 6.5l1.745 3-3.245.5" stroke="#B91C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 25.5l-1.745-3 3.245-.5" stroke="#B91C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="12" y="15" width="8" height="6" rx="1.5" stroke="#B91C1C" stroke-width="1.8"/>
        <path d="M14 15v-2a2 2 0 014 0v2" stroke="#B91C1C" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Reset Card -->
    <div class="reset-card">
      <h1>Set a new password</h1>
      <p class="subtitle">Your new password must be at least 8 characters.</p>

      <!-- New Password -->
      <div class="field">
        <label for="newPassword">New Password</label>
        <div class="input-wrap">
          <input type="password" id="newPassword" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" />
          <button class="toggle-btn" type="button" onclick="toggleVisibility('newPassword', this)">
            <svg id="eye1Show" width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="12" cy="12" r="3" stroke="#6B7280" stroke-width="1.5"/>
            </svg>
            <svg id="eye1Hide" width="20" height="20" viewBox="0 0 24 24" fill="none" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="1" y1="1" x2="23" y2="23" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="strength-wrap">
          <div class="strength-bar-track">
            <div class="strength-bar-fill" id="strengthFill"></div>
          </div>
          <div class="strength-meta">
            <span class="strength-label">Security Strength</span>
            <span class="strength-value" id="strengthText">—</span>
          </div>
        </div>
        <span class="error-msg" id="newPasswordError"></span>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label for="confirmPassword">Confirm New Password</label>
        <div class="input-wrap">
          <input type="password" id="confirmPassword" placeholder="Re-type password" />
          <button class="toggle-btn" type="button" onclick="toggleVisibility('confirmPassword', this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <rect x="5" y="11" width="14" height="10" rx="2" stroke="#6B7280" stroke-width="1.5"/>
              <path d="M8 11V7a4 4 0 018 0v4" stroke="#6B7280" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" id="confirmPasswordError"></span>
      </div>

      <button class="btn-reset" id="resetBtn" onclick="handleReset()">Reset Password</button>
      <a href="index.html" class="back-link">Back to Login</a>
    </div>

    <div class="security-note">Clinical Data Security</div>

    <footer>
      <span>© 2026 LIFELINK. ALL RIGHTS RESERVED.</span>
      <nav>
        <a href="#">PRIVACY POLICY</a>
        <a href="#">TERMS OF SERVICE</a>
        <a href="#">HELP CENTER</a>
      </nav>
    </footer>
  </div>

  <script src="reset-script.js"></script>
</body>
</html>
